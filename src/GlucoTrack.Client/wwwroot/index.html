<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GlucoTrack</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
    <link href="GlucoTrack.Client.styles.css" rel="stylesheet" />
    <link href="manifest.webmanifest" rel="manifest" />
    <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png" />
    <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png" />
</head>

<body>
    <div id="app">
        <div class="auth-wrapper" style="background:#F4F7FF;">
            <style>
                .splash-logo { position:relative; overflow:hidden; width:100px; height:100px; }
                .splash-logo::after { content:''; position:absolute; top:-20%; left:-80%; width:350%; height:180%; background:linear-gradient(90deg,transparent 10%,rgba(244,247,255,.7) 50%,transparent 90%); transform:skewX(-30deg); animation:logo-shine 4s ease-in-out infinite; }
                @keyframes logo-shine { 0%{left:-220%} 40%{left:180%} 100%{left:180%} }
                .auth-card { box-shadow:none !important; }
                .auth-card::before { display:none !important; }
            </style>
            <div class="auth-card">
                <div class="auth-content">
                    <div class="auth-logo">
                        <div class="logo-img-wrapper">
                            <div class="splash-logo">
                                <img src="logo.png" alt="VitaTrack" class="logo-icon" />
                            </div>
                        </div>
                        <h1>VitaTrack</h1>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="blazor-error-ui">
        Произошла непредвиденная ошибка.
        <a href="" class="reload">Перезагрузить</a>
        <a class="dismiss">🗙</a>
    </div>
    <script src="js/db.js?v=2"></script>
    <script src="_framework/blazor.webassembly.js" autostart="false"></script>
    <script>
        if (navigator.serviceWorker) navigator.serviceWorker.register('service-worker.js');
        setTimeout(() => Blazor.start(), 1000);
        window.clearGlucoDb = function () {
            indexedDB.deleteDatabase('glucotrack_v1');
            localStorage.removeItem('glucotrack_last_sync');
        };
    </script>
</body>

</html>
